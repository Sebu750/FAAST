<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect FIRST — before any resource requests -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical woff2 font files directly (not CSS) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" />
    
    <!-- Font stylesheet — async load, non-blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" /></noscript>
    
    <!-- Preconnect to Supabase -->
    <link rel="dns-prefetch" href="https://supabase.co" />
    
    <!-- Critical inline CSS — prevents FOUC and layout shift -->
    <style>
      html{background:#000;color-scheme:dark}
      body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#000;color:#fafafa}
      #root{min-height:100vh}
    </style>
    
    <!-- Default SEO tags -->
    <title>Adorzia - Where Visionaries Rise | Pakistani Fashion Ecosystem</title>
    <meta name="description" content="Adorzia is Pakistan's first fashion entrepreneurship ecosystem - coworking studios, curated marketplace, and Spotlight talent event." />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <link rel="canonical" href="https://adorzia.com" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adorzia.com" />
    <meta property="og:title" content="Adorzia - Where Visionaries Rise" />
    <meta property="og:description" content="Pakistan's first complete fashion entrepreneurship ecosystem. Studios. Marketplace. Spotlight." />
    <meta property="og:image" content="https://adorzia.com/og-image.jpeg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Adorzia" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://adorzia.com" />
    <meta name="twitter:title" content="Adorzia - Where Visionaries Rise" />
    <meta name="twitter:description" content="Pakistan's first complete fashion entrepreneurship ecosystem." />
    <meta name="twitter:image" content="https://adorzia.com/og-image.jpeg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
